<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: #fff; display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; align-items: end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box  { width: 70px; height: 70px; background: var(--nv-blue); }
  .lab  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
  .v    { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:4px"></div><span class="lab">--radius-xs</span><span class="v">4 px</span></div>
  <div class="item"><div class="box" style="border-radius:6px"></div><span class="lab">--radius-sm</span><span class="v">6 px</span></div>
  <div class="item"><div class="box" style="border-radius:10px"></div><span class="lab">--radius-md</span><span class="v">10 px</span></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><span class="lab">--radius-lg</span><span class="v">16 px</span></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><span class="lab">--radius-xl</span><span class="v">24 px</span></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><span class="lab">--pill</span><span class="v">999 px</span></div>
</body>
</html>
