<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: #fff; display: flex; flex-direction: column; gap: 6px; }
  .row { display: grid; grid-template-columns: 64px 1fr 60px; align-items: center; gap: 12px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
  .bar { height: 12px; background: var(--nv-turquoise); border-radius: 2px; }
  .px  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); text-align: right; }
</style>
</head>
<body>
  <div class="row"><span class="tok">--sp-1</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
  <div class="row"><span class="tok">--sp-2</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
  <div class="row"><span class="tok">--sp-3</span><div class="bar" style="width:12px"></div><span class="px">12 px</span></div>
  <div class="row"><span class="tok">--sp-4</span><div class="bar" style="width:16px"></div><span class="px">16 px</span></div>
  <div class="row"><span class="tok">--sp-5</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
  <div class="row"><span class="tok">--sp-6</span><div class="bar" style="width:32px"></div><span class="px">32 px</span></div>
  <div class="row"><span class="tok">--sp-7</span><div class="bar" style="width:48px"></div><span class="px">48 px</span></div>
  <div class="row"><span class="tok">--sp-8</span><div class="bar" style="width:64px"></div><span class="px">64 px</span></div>
  <div class="row"><span class="tok">--sp-9</span><div class="bar" style="width:96px"></div><span class="px">96 px</span></div>
</body>
</html>
