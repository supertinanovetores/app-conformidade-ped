<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; font-family: var(--font-body); }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .b-blue   { background: #E5EAF7; color: #002590; }
  .b-turq   { background: #D6FBF6; color: #006D63; }
  .b-gray   { background: #E8EAED; color: #2B3B49; }
  .b-success { background: #DCF5EE; color: #00B894; }
  .b-warn   { background: #FCEDD7; color: #B5751B; }
  .b-danger { background: #FCDDDA; color: #B0382F; }
  .solid    { background: #002590; color: #fff; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
</style>
</head>
<body>
  <span class="badge b-blue"><i class="dot"></i>Patented</span>
  <span class="badge b-turq">Bio-based</span>
  <span class="badge b-gray">Lab-scale</span>
  <span class="badge b-success">Approved</span>
  <span class="badge b-warn">Pilot</span>
  <span class="badge b-danger">Restricted</span>
  <span class="badge solid">PRODUCTION</span>
</body>
</html>
