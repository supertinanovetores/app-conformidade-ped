<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo · Approved backgrounds</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border-radius: var(--radius-md); padding: 22px 16px; min-height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; gap: 12px; border: 1px solid rgba(17,33,46,0.06); }
  .swatch img { display: block; max-width: 100%; max-height: 50px; width: auto; height: auto; }
  .cap { font-family: var(--font-display); font-weight: 600; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
  .swatch .cap span.hex { font-family: var(--font-mono); font-weight: 500; opacity: 0.7; margin-left: 6px; }

  /* Pastel tints — lightened versions of the four approved background colors */
  .on-white { background: #FFFFFF; color: var(--nv-gray-blue); }
  .on-blue  { background: #DCE3F4; color: #002590; }   /* pastel of #002590 */
  .on-turq  { background: #D6FBF6; color: #006D63; }   /* pastel of #00E4D0 */
  .on-gray  { background: #E6EAEE; color: #4F6273; }   /* pastel of #708597 */
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch on-white">
      <img src="../assets/logos/logo-sem-tagline.png" alt="">
      <span class="cap">White <span class="hex">#FFFFFF</span></span>
    </div>
    <div class="swatch on-blue">
      <img src="../assets/logos/logo-sem-tagline.png" alt="">
      <span class="cap">Blue <span class="hex">#002590</span></span>
    </div>
    <div class="swatch on-turq">
      <img src="../assets/logos/logo-sem-tagline.png" alt="">
      <span class="cap">Turquoise <span class="hex">#00E4D0</span></span>
    </div>
    <div class="swatch on-gray">
      <img src="../assets/logos/logo-sem-tagline.png" alt="">
      <span class="cap">Gray-Blue <span class="hex">#708597</span></span>
    </div>
  </div>
</body>
</html>
