<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo · Givaudan co-brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #fff; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .panel { border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; padding: 26px; min-height: 130px; }
  .panel img { display: block; max-width: 90%; max-height: 60px; }
  .light { background: #fff; border: 1px solid var(--border-1); }
  .dark  { background: #002590; }
  .cap { position: absolute; bottom: 6px; left: 12px; font-family: var(--font-display); font-weight:600; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
  .light .cap { color: var(--nv-gray-blue); }
  .dark  .cap { color: rgba(255,255,255,.7); }
  .panel { position: relative; }
</style>
</head>
<body>
  <div class="panel light">
    <img src="../assets/logos/givaudan-nanovetores.png" alt="Givaudan | NANOVETORES">
    <span class="cap">Positivo / on light</span>
  </div>
  <div class="panel dark">
    <img src="../assets/logos/givaudan-nanovetores-branco.png" alt="Givaudan | NANOVETORES">
    <span class="cap">Negativo / on dark</span>
  </div>
</body>
</html>
