<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo · Variants</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 18px 12px; border: 1px solid var(--border-1); border-radius: var(--radius-md); background: #fff; min-height: 120px; justify-content: center; }
  .cell img { display: block; max-width: 100%; max-height: 56px; width: auto; height: auto; }
  .cap { font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--nv-gray-blue); text-align: center; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><img src="../assets/logos/logo-completo.png" alt=""><span class="cap">Full lockup</span></div>
    <div class="cell"><img src="../assets/logos/logo-sem-tagline.png" alt=""><span class="cap">No tagline</span></div>
    <div class="cell"><img src="../assets/logos/simbolo.png" alt="" style="max-height:64px"><span class="cap">Symbol only</span></div>
    <div class="cell"><img src="../assets/logos/tipografia-com-tagline.png" alt=""><span class="cap">Wordmark + tagline</span></div>
  </div>
</body>
</html>
