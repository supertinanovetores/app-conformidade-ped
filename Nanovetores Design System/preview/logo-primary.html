<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo · Primary lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: #fff; display: flex; align-items: center; gap: 28px; }
  .logo-wrap { flex: 0 0 auto; display: flex; align-items: center; justify-content: center; padding: 16px 22px; border: 1px solid var(--border-1); border-radius: var(--radius-md); background: #fff; }
  .logo-wrap img { display: block; height: 70px; width: auto; }
  .meta { display: flex; flex-direction: column; gap: 4px; }
  .label { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--nv-gray-blue); }
  .name  { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: var(--fg-1); }
  .file  { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); }
  .tagline { font-family: var(--font-body); font-size: 13px; color: var(--fg-2); }
</style>
</head>
<body>
  <div class="logo-wrap"><img src="../assets/logos/logo-completo.png" alt="Nanovetores"></div>
  <div class="meta">
    <span class="label">Primary lockup</span>
    <span class="name">Symbol + wordmark + tagline</span>
    <span class="tagline">Use whenever space allows. Minimum 150px wide.</span>
    <span class="file">assets/logos/logo-completo.png</span>
  </div>
</body>
</html>
