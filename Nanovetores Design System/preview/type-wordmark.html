<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Wordmark anatomy</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: #fff; display: flex; flex-direction: column; gap: 14px; align-items: flex-start; justify-content: center; }
  .wm { font-family: var(--font-display); font-weight: 600; font-size: 56px; letter-spacing: 0.02em; color: var(--nv-gray-blue); text-transform: uppercase; line-height: 1; margin: 0; }
  .tg { font-family: var(--font-body); font-weight: 300; font-size: 18px; color: var(--nv-gray-blue); margin: -2px 0 0 4px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); display: flex; gap: 18px; }
  .meta b { color: var(--fg-1); font-weight: 500; }
</style>
</head>
<body>
  <div>
    <p class="wm">NANOVETORES</p>
    <p class="tg">Involved in technology</p>
  </div>
  <div class="meta">
    <span><b>Family</b> Saira (Google Fonts)</span>
    <span><b>Weight</b> 600</span>
    <span><b>Tracking</b> 0.02em</span>
    <span><b>Color</b> #708597</span>
  </div>
</body>
</html>
