<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  button { font-family: var(--font-body); font-weight: 500; font-size: 14px; letter-spacing: 0.01em; padding: 10px 18px; border-radius: 8px; border: 0; cursor: pointer; transition: all 200ms cubic-bezier(0.2,0.7,0.2,1); }
  .primary { background: #002590; color: #fff; box-shadow: 0 8px 24px rgba(0,37,144,0.18); }
  .primary:hover { background: #001E76; }
  .accent  { background: #00E4D0; color: #002590; font-weight: 600; }
  .accent:hover { background: #00CFBC; }
  .secondary { background: #fff; color: #002590; border: 1px solid #D7DCE2; }
  .secondary:hover { background: #F7F8FA; border-color: #708597; }
  .ghost { background: transparent; color: #002590; padding: 10px 14px; }
  .ghost:hover { background: #E8EAED; }
  .pill  { border-radius: 999px; padding: 8px 16px; background: #E8EAED; color: #2B3B49; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .danger { background: #E0524A; color: #fff; }
  .lg { padding: 14px 24px; font-size: 16px; }
  .sm { padding: 7px 12px; font-size: 12px; }
</style>
</head>
<body>
  <button class="primary">Talk to R&amp;D</button>
  <button class="accent">Request sample</button>
  <button class="secondary">Learn more</button>
  <button class="ghost">Cancel</button>
  <button class="primary lg">Primary · Large</button>
  <button class="secondary sm">Secondary · Small</button>
  <button class="pill">Status pill</button>
  <button class="danger">Delete</button>
</body>
</html>
